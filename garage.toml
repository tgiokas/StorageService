# Garage configuration for local development
# https://garagehq.deuxfleurs.fr/documentation/reference-manual/configuration/

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"

db_engine = "lmdb"

# Replication factor: 1 = no replication (single-node dev setup)
replication_factor = 1

# Internal RPC (cluster communication) — single-node
rpc_bind_addr = "0.0.0.0:3903"
rpc_secret = "e57d9d4105d33286139ddf836f47484a1eef15922eb4328d150ddd64e1793ef3"

[s3_api]
s3_region = "garage"
api_bind_addr = "0.0.0.0:3900"
# Leave empty to use path-style requests only (required for single-node)
root_domain = ""

[s3_web]
bind_addr = "0.0.0.0:3902"
root_domain = ".web.garage.localhost"
index = "index.html"
error_document = "404.html"

[admin]
api_bind_addr = "0.0.0.0:3901"
admin_token = "0799609a6c814fba72672d394a67f2f4c577adb6e785006012fe3e22341b457c"
