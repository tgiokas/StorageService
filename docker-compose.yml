  minio:
    image: minio/minio:latest
    container_name: minio
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    networks:
      - archium-network
    volumes:
      - ./volumes/minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v1.0.1
    container_name: garage
    env_file:
      - .env
    environment:
      GARAGE_ADMIN_TOKEN: "garage-admin-token"
    ports:
      - "3900:3900"   # S3 API
      - "3901:3901"   # Admin API
    volumes:
      - ./volumes/garage_data:/var/lib/garage/data
      - ./volumes/garage_meta:/var/lib/garage/meta
      - ./garage.toml:/etc/garage.toml:ro
    networks:
      - archium-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3900/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  garage-ui:
    image: khairul169/garage-webui:latest
    container_name: garage-ui
    ports:
      - "3909:3909"   # Web UI
    environment:
      API_BASE_URL: http://garage:3901
      S3_ENDPOINT_URL: http://garage:3900
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
    depends_on:
      - garage
    networks:
      - archium-network

  storage-api:
    container_name: storage-api
    build:
      context: .
      dockerfile: src/API/Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      STORAGE_PROVIDER: ${STORAGE_PROVIDER}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      SEAWEEDFS_MASTER_URL: ${SEAWEEDFS_MASTER_URL}
      SEAWEEDFS_FILER_URL: ${SEAWEEDFS_FILER_URL}
      AZURE_BLOB_CONNECTION_STRING: ${AZURE_BLOB_CONNECTION_STRING}
      GARAGE_ENDPOINT: ${GARAGE_ENDPOINT}
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_USE_SSL: ${GARAGE_USE_SSL}
      GARAGE_REGION: ${GARAGE_REGION}
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "5034:8080"
    networks:
      - archium-network
    volumes:
      - ./error-codes/errors.json:/app/errors.json:ro
 
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false      
      - ES_JAVA_OPTS=-Xms1g -Xmx1g     
    networks:
      - archium-network
    # volumes:
    #   - esdata:/usr/share/elasticsearch/data
    restart: always

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    networks:
      - archium-network   
    depends_on:
      - elasticsearch
    restart: always

volumes:
  storage-db-data: 
      
networks:
  archium-network:
    driver: bridge
    name: archium-network
